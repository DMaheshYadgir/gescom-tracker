<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GESCOM Disconnection Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GESCOM Tracker">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#0B2545">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#0B2545;font-family:Arial,sans-serif;color:#fff;overflow:hidden;}
    #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;background:linear-gradient(160deg,#0B2545 0%,#134074 60%,#0B2545 100%);position:relative;}
    #splash::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,0.03);top:-80px;right:-80px;}
    #splash::after{content:'';position:absolute;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.03);bottom:-60px;left:-60px;}
    #logoWrap{position:relative;z-index:1;margin-bottom:28px;}
    #logoImg{width:160px;height:160px;border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,0.45);display:block;}
    #appTitle{font-size:22px;font-weight:bold;color:#fff;letter-spacing:0.5px;margin-bottom:6px;position:relative;z-index:1;}
    #appSub{font-size:14px;color:#F4A300;font-weight:bold;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;position:relative;z-index:1;}
    #appOrg{font-size:13px;color:#9BBAD8;margin-bottom:40px;position:relative;z-index:1;}
    #loadWrap{position:relative;z-index:1;width:100%;max-width:260px;}
    #loadLabel{font-size:13px;color:#9BBAD8;margin-bottom:10px;}
    #loadTrack{background:rgba(255,255,255,0.12);border-radius:6px;height:6px;overflow:hidden;}
    #loadBar{height:100%;border-radius:6px;background:linear-gradient(90deg,#F4A300,#FFD060);width:0%;transition:width 0.3s ease;}
    #monthBadge{display:none;margin-top:20px;background:rgba(244,163,0,0.15);border:1px solid rgba(244,163,0,0.4);border-radius:20px;padding:5px 16px;font-size:13px;color:#F4A300;font-weight:bold;position:relative;z-index:1;}
    #errorBox{display:none;margin-top:24px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);border-radius:10px;padding:16px 20px;max-width:300px;position:relative;z-index:1;}
    #errorBox p{font-size:13px;color:#F1948A;line-height:1.5;margin-bottom:12px;}
    #retryBtn{background:#F4A300;color:#0B2545;border:none;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;width:100%;}
    #footer{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-size:11px;color:rgba(155,186,216,0.5);z-index:1;}
  </style>
</head>
<body>
<div id="splash">
  <div id="logoWrap"><img id="logoImg" src="icon-512.png" alt="GESCOM Logo"></div>
  <div id="appSub">GESCOM &middot; KALABURAGI</div>
  <div id="appTitle">Disconnection Tracker</div>
  <div id="appOrg">Yadgir Division &mdash; Arrears Recovery Programme</div>
  <div id="loadWrap">
    <div id="loadLabel">Loading current month's app&hellip;</div>
    <div id="loadTrack"><div id="loadBar"></div></div>
    <div id="monthBadge"></div>
  </div>
  <div id="errorBox">
    <p id="errorMsg">Unable to load the app. Please check your internet connection and try again.</p>
    <button id="retryBtn" onclick="loadConfig()">Retry</button>
  </div>
</div>
<div id="footer">GESCOM Yadgir Division &nbsp;&middot;&nbsp; Arrears Recovery Tracker</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
var CONFIG_URL='https://DMaheshYadgir.github.io/gescom-tracker/config.json';
var _pct=0;
function setProgress(p){_pct=p;document.getElementById('loadBar').style.width=p+'%';}
function animateTo(target,dur,cb){
  var s=_pct,t0=Date.now();
  function step(){var e=Date.now()-t0,p=Math.min(e/dur,1),ez=1-Math.pow(1-p,3);
    setProgress(s+(target-s)*ez);
    if(p<1)requestAnimationFrame(step); else if(cb)cb();}
  requestAnimationFrame(step);
}
function loadConfig(){
  document.getElementById('errorBox').style.display='none';
  document.getElementById('loadWrap').style.display='block';
  document.getElementById('loadLabel').textContent="Loading current month's app\u2026";
  animateTo(40,600,function(){
    fetch(CONFIG_URL+'?v='+Date.now())
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(cfg){
        if(!cfg.appUrl)throw new Error('App URL missing in config.');
        animateTo(80,400,function(){
          var b=document.getElementById('monthBadge');
          b.textContent='\uD83D\uDCC5 '+(cfg.month||'Current Month');
          b.style.display='inline-block';
          document.getElementById('loadLabel').textContent='Redirecting to '+(cfg.month||'app')+'\u2026';
          animateTo(100,300,function(){
            setTimeout(function(){window.location.replace(cfg.appUrl);},500);
          });
        });
      })
      .catch(function(err){
        setProgress(0);
        document.getElementById('loadBar').style.width='0%';
        document.getElementById('errorBox').style.display='block';
        document.getElementById('monthBadge').style.display='none';
        document.getElementById('loadLabel').textContent='';
        document.getElementById('errorMsg').textContent=!navigator.onLine
          ?'You are offline. Connect to internet and tap Retry.'
          :'Could not load app config. Tap Retry or contact the Division Office. ('+err.message+')';
      });
  });
}
document.addEventListener('DOMContentLoaded',function(){setTimeout(loadConfig,300);});
</script>
</body>
</html>
